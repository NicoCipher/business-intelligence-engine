[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Readable output by default
addopts =
    -v
    --tb=short
    --no-header

# Treat warnings as errors to catch deprecation issues early
filterwarnings =
    error
    ignore::DeprecationWarning:praw
    ignore::DeprecationWarning:urllib3
